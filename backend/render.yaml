services:
  - type: web
    name: aeon-backend
    runtime: node
    rootDir: backend
    plan: starter
    healthCheckPath: /health/ready
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:migrate
    startCommand: npm run start:render
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        value: https://aeon-9cds.onrender.com
      - key: SUPABASE_JWT_AUDIENCE
        value: authenticated
      - key: AUTH_JWT_ISSUER
        value: aeon-backend
      - key: AUTH_JWT_AUDIENCE
        value: authenticated
      - key: AUTH_ACCESS_TOKEN_TTL_MINUTES
        value: 15
      - key: ACCESS_TOKEN_TTL_SECONDS
        value: 900
      - key: AUTH_REFRESH_TOKEN_TTL_DAYS
        value: 30
      - key: AUTH_SIGNUP_PROOF_TTL_MINUTES
        value: 15
      - key: AUTH_REAUTH_TTL_MINUTES
        value: 10
      - key: AUTH_EMAIL_OTP_TTL_MINUTES
        value: 10
      - key: AUTH_EMAIL_OTP_RESEND_SECONDS
        value: 60
      - key: AUTH_EMAIL_OTP_MAX_ATTEMPTS
        value: 5
      - key: AUTH_PASSWORD_MAX_FAILED_ATTEMPTS
        value: 5
      - key: AUTH_PASSWORD_LOCKOUT_MINUTES
        value: 15
      - key: AUTH_ALLOWED_MOBILE_REDIRECT_URIS
        value: aeon://auth/callback
      - key: DEFAULT_TIMEZONE
        value: Asia/Calcutta
      - key: DEFAULT_CURRENCY
        value: INR
      - key: DB_POOL_MAX
        value: 10
      - key: RATE_LIMIT_MAX
        value: 300
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: AUTH_JWT_SECRET
        sync: false
      - key: AUTH_TOKEN_HASH_PEPPER
        sync: false
      - key: PASSWORD_PEPPER
        sync: false
      - key: OTP_PEPPER
        sync: false
      - key: REFRESH_TOKEN_PEPPER
        sync: false
      - key: AUTH_EMAIL_FROM
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        value: 279935595299-p1s6m4grg47600q8sq7bl64q48eiakga.apps.googleusercontent.com
      - key: GOOGLE_WEB_CLIENT_ID
        value: 279935595299-p1s6m4grg47600q8sq7bl64q48eiakga.apps.googleusercontent.com
      - key: GOOGLE_ANDROID_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        value: https://aeon-9cds.onrender.com/v1/auth/google/callback
